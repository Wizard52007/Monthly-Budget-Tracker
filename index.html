<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Budget Tracker</title>
    <link rel="stylesheet" href="Final.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
 
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
       (function(){
          emailjs.init("-38yxG1UAwWl1qNyW"); 
       })();
    </script>
</head>
<body>

    <div class="container">
        <header class="header-section">
            <h2>Budget Tracker</h2>
            
            <div class="status-bar">
                <div class="stat-item">
                    <span>Monthly Budget</span>
                    <strong id="display-budget">₹0</strong>
                </div>
                <div class="stat-item">
                    <span>Total Spent</span>
                    <strong id="total-spent" class="total-badge">₹0</strong>
                </div>
                <div class="stat-item">
                    <span>Remaining</span>
                    <strong id="remaining-budget">₹0</strong>
                </div>
            </div>

            <div class="budget-setter">
                <input type="number" id="monthly-limit" placeholder="Set monthly budget">
                <button onclick="setMonthlyBudget()">Update Budget</button>
            </div>
        </header>

        <div class="controls">
            <input type="number" id="expense-amount" placeholder="Amount">
            <select id="expense-category">
                <option value="Food">Food</option>
                <option value="Stationery">Stationery</option>
                <option value="Transport">Transport</option>
                <option value="Entertainment">Entertainment</option>
                <option value="MoneyLent">Money Lent</option>
                <option value="Other">Other</option>
            </select>
            <button onclick="addExpense()">Add Expense</button>
            <button onclick="resetAllData()" class="reset-btn">Reset All</button>
        </div>
<div class="chart-container" style="background: white; padding: 20px; border-radius: 20px; box-shadow: var(--soft-shadow); margin-bottom: 40px;">
    <canvas id="budgetChart"></canvas>
</div>
        <div class="category-grid">
            <div class="category-card"><h3>🍕 Food</h3><ul id="list-Food"></ul></div>
            <div class="category-card"><h3>📚 Stationery</h3><ul id="list-Stationery"></ul></div>
            <div class="category-card"><h3>🚌 Transport</h3><ul id="list-Transport"></ul></div>
            <div class="category-card"><h3>🎮 Entertainment</h3><ul id="list-Entertainment"></ul></div>
            <div class="category-card"><h3>🤝 Money Lent</h3><ul id="list-MoneyLent"></ul></div>
            <div class="category-card"><h3>✨ Other</h3><ul id="list-Other"></ul></div>
        </div>
    </div>

    <script src="Final.js"></script>
</body>
</html>
